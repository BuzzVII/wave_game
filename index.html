<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wave Survival Prototype</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        background: #2a2a2a;
        width: min(100vw, calc(100vh * 480 / 854));
        height: min(100vh, calc(100vw * 854 / 480));
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
